<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset Password — Kasir App">
  <title>Reset Password — Kasir App</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="shield-check" style="color: var(--primary); width: 32px; height: 32px;"></i>
        </div>
        <h1>Buat Password Baru</h1>
        <p>Masukkan password baru untuk akun Anda</p>
      </div>

      <div id="loadingState" style="text-align:center;padding:20px 0;color:var(--text-muted);">
        <div class="spinner" style="margin:0 auto 12px;"></div>
        Memverifikasi link reset...
      </div>

      <div id="invalidState" style="display:none;">
        <div class="alert alert-error show" style="margin-bottom:16px;">
          ❌ Link reset password tidak valid atau sudah kedaluwarsa.<br>
          Silakan minta link reset baru.
        </div>
        <a href="forgot-password.html" class="btn btn-primary" style="text-decoration:none;display:flex;justify-content:center;">
          Minta Link Reset Baru
        </a>
      </div>

      <div id="resetFormWrapper" style="display:none;">
        <div id="alertBox" class="alert alert-error"></div>
        <div id="successBox" class="alert alert-success"></div>

        <form id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPassword">Password Baru</label>
            <div style="position:relative;">
              <input type="password" id="newPassword" placeholder="Min. 6 karakter" required style="padding-right:42px;">
              <button type="button" onclick="togglePw('newPassword','eyeNew')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;">
                <i data-lucide="eye" id="eyeNew" style="width:16px;height:16px;"></i>
              </button>
            </div>
            <div class="password-strength" id="strengthBar" style="display:none;">
              <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
              <span id="strengthLabel"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Konfirmasi Password Baru</label>
            <div style="position:relative;">
              <input type="password" id="confirmPassword" placeholder="Ulangi password baru" required style="padding-right:42px;">
              <button type="button" onclick="togglePw('confirmPassword','eyeConfirm')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;">
                <i data-lucide="eye" id="eyeConfirm" style="width:16px;height:16px;"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="resetBtn">
            <i data-lucide="save" style="width:16px;height:16px;"></i> Simpan Password Baru
          </button>
        </form>
      </div>

      <div class="login-links" style="margin-top:16px;">
        <a href="login.html">
          <i data-lucide="arrow-left" style="width:13px;height:13px;vertical-align:middle;"></i> Kembali ke Login
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    lucide.createIcons();

    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.setAttribute('data-lucide', input.type === 'password' ? 'eye' : 'eye-off');
      lucide.createIcons();
    }

    // Password strength meter
    document.getElementById('newPassword').addEventListener('input', function() {
      const val  = this.value;
      const bar  = document.getElementById('strengthBar');
      const fill = document.getElementById('strengthFill');
      const lbl  = document.getElementById('strengthLabel');
      if (!val) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';

      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '20%', color: '#ef4444', text: 'Sangat Lemah' },
        { pct: '40%', color: '#f97316', text: 'Lemah' },
        { pct: '60%', color: '#eab308', text: 'Cukup' },
        { pct: '80%', color: '#22c55e', text: 'Kuat' },
        { pct: '100%', color: '#10b981', text: 'Sangat Kuat' },
      ];
      const lvl = levels[Math.min(score - 1, 4)] || levels[0];
      fill.style.width = lvl.pct;
      fill.style.background = lvl.color;
      lbl.textContent = lvl.text;
      lbl.style.color = lvl.color;
    });

    const alertBox   = document.getElementById('alertBox');
    const successBox = document.getElementById('successBox');

    function showErr(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
      successBox.classList.remove('show');
    }
    function showOk(msg) {
      successBox.innerHTML = msg;
      successBox.className = 'alert alert-success show';
      alertBox.classList.remove('show');
    }

    // Supabase menangani token dari URL hash secara otomatis
    // Kita cukup listen perubahan sesi
    supabase.auth.onAuthStateChange(async (event, session) => {
      document.getElementById('loadingState').style.display = 'none';

      if (event === 'PASSWORD_RECOVERY') {
        // Token valid — tampilkan form reset
        document.getElementById('resetFormWrapper').style.display = 'block';
        lucide.createIcons();
      } else if (event === 'SIGNED_IN' && window.location.hash.includes('type=recovery')) {
        document.getElementById('resetFormWrapper').style.display = 'block';
        lucide.createIcons();
      } else if (!session) {
        // Tidak ada token atau sudah kedaluwarsa
        document.getElementById('invalidState').style.display = 'block';
      } else {
        // Sudah login biasa, redirect
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.remove('show');
      successBox.classList.remove('show');

      const newPw  = document.getElementById('newPassword').value;
      const conPw  = document.getElementById('confirmPassword').value;
      const btn    = document.getElementById('resetBtn');

      if (!newPw || !conPw) { showErr('Semua field wajib diisi.'); return; }
      if (newPw.length < 6)  { showErr('Password minimal 6 karakter.'); return; }
      if (newPw !== conPw)   { showErr('Konfirmasi password tidak cocok.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Menyimpan...';

      try {
        const { error } = await supabase.auth.updateUser({ password: newPw });
        if (error) throw error;

        showOk('✅ <strong>Password berhasil diubah!</strong> Mengalihkan ke halaman login...');
        document.getElementById('resetForm').style.display = 'none';

        setTimeout(() => {
          supabase.auth.signOut();
          window.location.href = 'login.html';
        }, 2500);

      } catch (err) {
        showErr('Gagal mengubah password: ' + err.message);
      } finally {
        btn.disabled    = false;
        btn.innerHTML   = '<i data-lucide="save" style="width:16px;height:16px;"></i> Simpan Password Baru';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
