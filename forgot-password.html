<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lupa Password — Point Market">
  <title>Lupa Password — Point Market</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="key-round" style="color: var(--primary); width: 32px; height: 32px;"></i>
        </div>
        <h1>Lupa Password</h1>
        <p>Masukkan email dan password baru Anda untuk menyetel ulang secara langsung</p>
      </div>

      <div id="alertBox" class="alert alert-error"></div>
      <div id="successBox" class="alert alert-success"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Akun Anda</label>
          <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password Baru</label>
          <div style="position:relative;">
            <input type="password" id="password" placeholder="••••••••" required style="padding-right:42px;">
            <button type="button" onclick="togglePassword('password','eyeIcon1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;">
              <i data-lucide="eye" id="eyeIcon1" style="width:16px;height:16px;"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Ulangi Password Baru</label>
          <div style="position:relative;">
            <input type="password" id="confirmPassword" placeholder="••••••••" required style="padding-right:42px;">
            <button type="button" onclick="togglePassword('confirmPassword','eyeIcon2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;">
              <i data-lucide="eye" id="eyeIcon2" style="width:16px;height:16px;"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="forgotBtn">
          <i data-lucide="save" style="width:16px;height:16px;"></i> Simpan Password Baru
        </button>
      </form>

      <div class="login-links" style="margin-bottom: 8px;">
        <a href="login.html">
          <i data-lucide="arrow-left" style="width:13px;height:13px;vertical-align:middle;"></i> Kembali ke Login
        </a>
      </div>
      <div style="font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 8px;">
        Ikon oleh <a href="https://www.magnific.com/idn/ikon-ikon" target="_blank" rel="noopener noreferrer" style="color: var(--primary); text-decoration: none;">Magnific</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=1.0.1"></script>
  <script>
    lucide.createIcons();

    const alertBox   = document.getElementById('alertBox');
    const successBox = document.getElementById('successBox');

    function togglePassword(inputId, eyeId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(eyeId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    function showErr(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
      successBox.classList.remove('show');
    }
    function showOk(msg) {
      successBox.innerHTML = msg;
      successBox.className = 'alert alert-success show';
      alertBox.classList.remove('show');
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.remove('show');
      successBox.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn   = document.getElementById('forgotBtn');

      if (!email) { showErr('Masukkan email Anda.'); return; }
      if (!password) { showErr('Masukkan password baru.'); return; }
      if (password.length < 6) { showErr('Password minimal 6 karakter.'); return; }
      if (password !== confirmPassword) { showErr('Ulangi password baru dengan benar.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Memproses...';

      try {
        const { data, error } = await supabase.rpc('reset_user_password_direct', {
          p_email: email,
          p_new_password: password
        });

        if (error) throw error;

        if (data === true) {
          showOk('✅ <strong>Password berhasil diperbarui!</strong> Silakan login menggunakan password baru Anda.');
          document.getElementById('forgotForm').style.display = 'none';
        } else {
          showErr('Email tidak terdaftar atau gagal mengubah password.');
        }

      } catch (err) {
        showErr(err.message || 'Gagal mengubah password. Silakan hubungi administrator.');
      } finally {
        btn.disabled    = false;
        btn.innerHTML   = '<i data-lucide="save" style="width:16px;height:16px;"></i> Simpan Password Baru';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
