<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lupa Password — Kasir App">
  <title>Lupa Password — Kasir App</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="key-round" style="color: var(--primary); width: 32px; height: 32px;"></i>
        </div>
        <h1>Lupa Password</h1>
        <p>Masukkan email Anda untuk menerima link reset password</p>
      </div>

      <div id="alertBox" class="alert alert-error"></div>
      <div id="successBox" class="alert alert-success"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Akun Anda</label>
          <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary" id="forgotBtn">
          <i data-lucide="send" style="width:16px;height:16px;"></i> Kirim Link Reset
        </button>
      </form>

      <div class="login-links">
        <a href="login.html">
          <i data-lucide="arrow-left" style="width:13px;height:13px;vertical-align:middle;"></i> Kembali ke Login
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=1.0.1"></script>
  <script>
    lucide.createIcons();

    const alertBox   = document.getElementById('alertBox');
    const successBox = document.getElementById('successBox');

    function showErr(msg) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert-error show';
      successBox.classList.remove('show');
    }
    function showOk(msg) {
      successBox.innerHTML = msg;
      successBox.className = 'alert alert-success show';
      alertBox.classList.remove('show');
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.remove('show');
      successBox.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('forgotBtn');

      if (!email) { showErr('Masukkan email Anda terlebih dahulu.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Mengirim...';

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: new URL('reset-password.html', window.location.href).href
        });

        if (error) throw error;

        showOk(
          '✅ <strong>Link reset password telah dikirim!</strong><br>' +
          'Cek inbox email <strong>' + email + '</strong> (cek juga folder spam).<br>' +
          'Link berlaku selama <strong>1 jam</strong>.'
        );
        document.getElementById('forgotForm').style.display = 'none';

      } catch (err) {
        // Jangan bocorkan info apakah email terdaftar atau tidak (keamanan)
        showOk(
          '✅ <strong>Jika email terdaftar, link reset telah dikirim.</strong><br>' +
          'Cek inbox atau folder spam Anda.'
        );
        document.getElementById('forgotForm').style.display = 'none';
      } finally {
        btn.disabled    = false;
        btn.innerHTML   = '<i data-lucide="send" style="width:16px;height:16px;"></i> Kirim Link Reset';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
