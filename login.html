<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login Sistem Kasir Anis — Point of Sale">
  <title>Login — Kasir App</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="shopping-cart" style="color: var(--primary); width: 32px; height: 32px;"></i>
        </div>
        <h1>Kasir App</h1>
        <p>Sistem Point of Sale</p>
      </div>

      <!-- Tab Role -->
      <div class="role-tabs">
        <button class="role-tab active" id="tabAdmin" onclick="switchTab('admin')">
          <i data-lucide="user-check" style="width: 15px; height: 15px; vertical-align: middle; margin-right: 4px;"></i> Admin
        </button>
        <button class="role-tab" id="tabKasir" onclick="switchTab('kasir')">
          <i data-lucide="receipt" style="width: 15px; height: 15px; vertical-align: middle; margin-right: 4px;"></i> Kasir
        </button>
      </div>

      <div id="alertBox" class="alert alert-error"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@toko.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:42px;">
            <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;">
              <i data-lucide="eye" id="eyeIcon" style="width:16px;height:16px;"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <i data-lucide="log-in" style="width:16px;height:16px;"></i> Masuk
        </button>
      </form>

      <div class="login-links">
        <a href="forgot-password.html">🔑 Lupa Password?</a>
        <span class="divider">·</span>
        <a href="register.html">📝 Daftar Akun Baru</a>
      </div>

      <p style="text-align:center; margin-top:16px; font-size:11px; color:var(--text-muted);">
        Hubungi administrator jika masih tidak bisa login
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
