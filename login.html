<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login Sistem Kasir - Point of Sale berbasis Supabase">
  <title>Login — Kasir App</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="shopping-cart" style="color: var(--primary); width: 32px; height: 32px;"></i>
        </div>
        <h1>Kasir App</h1>
        <p>Sistem Point of Sale</p>
      </div>

      <!-- Tab Role -->
      <div class="role-tabs">
        <button class="role-tab active" id="tabAdmin" onclick="switchTab('admin')">
          <i data-lucide="user-check" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i> Admin
        </button>
        <button class="role-tab" id="tabKasir" onclick="switchTab('kasir')">
          <i data-lucide="receipt" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i> Kasir
        </button>
      </div>

      <div id="alertBox" class="alert alert-error"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@toko.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Masuk</button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted);">
        Hubungi administrator jika tidak bisa login
      </p>
    </div>
  </div>

  <script>
    function switchTab(role) {
      document.getElementById('tabAdmin').classList.toggle('active', role === 'admin');
      document.getElementById('tabKasir').classList.toggle('active', role === 'kasir');
    }
  </script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Initialize Lucide Icons
    lucide.createIcons();
  </script>
</body>
</html>
